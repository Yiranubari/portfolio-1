# Next.js static export. These file-based settings override the Netlify UI
# build settings, so the stale `build` publish directory is no longer used.
[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

# LASTFM_USER is a public Last.fm username (it equals the site owner's name, so
# it naturally appears throughout the code/README). It is not a secret, so
# exclude it from secrets scanning. The real secret, LASTFM_API_KEY, stays
# scanned and must never appear in the repo.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "LASTFM_USER"
